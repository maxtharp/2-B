<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- the next line allows Bootstrap to interface with mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Bucket List for Travel</title>
    <!--Include the CSS for Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container py-4 py-md-5">
        <div class="content-box mx-auto">
            <h1 class="mb-4">My Travel Bucket List</h1>
            {% block content %}{% endblock %}
        </div>
    </div>
  <!--Include the JavaScript for Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
